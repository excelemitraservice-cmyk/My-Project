<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Computer Education - Complete ERP Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f4fe', 100: '#dbe5fc', 500: '#1d4ed8',
                            600: '#1e40af', 700: '#1d3557', 800: '#111827', accent: '#f59e0b'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.95); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1d4ed8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        /* Admin Sidebar Styles */
        .sidebar-menu-item { padding: 0.75rem 1rem; margin-bottom: 0.25rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 600; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; color: #475569; }
        .sidebar-menu-item:hover { background-color: #f1f5f9; color: #1d4ed8; }
        .dark .sidebar-menu-item { color: #cbd5e1; }
        .dark .sidebar-menu-item:hover { background-color: #334155; color: #60a5fa; }
        .sidebar-menu-item.active { background-color: #eff6ff; color: #1d4ed8; }
        .dark .sidebar-menu-item.active { background-color: #1e3a8a; color: #60a5fa; }
        
        .sub-menu { padding-left: 2.5rem; margin-top: 0.25rem; display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 0.5rem; }
        .sub-menu-item { font-size: 0.75rem; padding: 0.5rem; border-radius: 0.375rem; cursor: pointer; transition: all 0.2s; color: #64748b; display: flex; align-items: center; gap: 0.5rem;}
        .sub-menu-item:hover { color: #1d4ed8; background-color: #f8fafc; }
        .dark .sub-menu-item { color: #94a3b8; }
        .dark .sub-menu-item:hover { color: #60a5fa; background-color: #0f172a; }
        .sub-menu-item.active { color: #1d4ed8; font-weight: 700; background-color: #f8fafc; }
        .dark .sub-menu-item.active { color: #60a5fa; background-color: #0f172a; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between bg-slate-50 dark:bg-slate-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // 🔥 Firebase Database URL
        const FIREBASE_URL = "https://excel-computer-education-default-rtdb.asia-southeast1.firebasedatabase.app";

        function App() {
            // ---- GLOBAL STATES ----
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [users, setUsers] = useState([]);
            const [exams, setExams] = useState([]);
            const [attempts, setAttempts] = useState([]);
            const [courses, setCourses] = useState([]); 
            const [payments, setPayments] = useState([]);
            const [loginHistory, setLoginHistory] = useState([]);
            
            const [appSettings, setAppSettings] = useState({
                logo: 'IMG-20200625-WA0007-removebg-preview2-2.png',
                title: 'Excel Computer Education',
                address: 'Shiv Vihar, Airport Road, Dabok, Udaipur',
                phone: '8875609703, 7976803471',
                marquee: 'Admission Open: RS-CIT, Tally, Library',
                adminId: 'Excelcomputereducation',
                adminPass: 'Kishan@64'
            });

            const [currentUser, setCurrentUser] = useState(null);
            const [currentPage, setCurrentPage] = useState('login'); 
            const [toasts, setToasts] = useState([]);
            const [isDarkMode, setIsDarkMode] = useState(false);

            // ---- AUTH STATES ----
            const [loginRole, setLoginRole] = useState('student');
            const [loginMobile, setLoginMobile] = useState('');
            const [loginPass, setLoginPass] = useState('');
            
            const initRegData = { 
                name: '', fatherName: '', mobile: '', gender: 'Male', dob: '', 
                course: '', courseCode: '',
                village: '', tehsil: '', dist: '', state: 'Rajasthan', pincode: '',
                password: '', cPassword: '', photo: '' 
            };
            const [regData, setRegData] = useState(initRegData);

            // ---- ADMIN HIERARCHY STATES ----
            const [activeAdminMenu, setActiveAdminMenu] = useState('dashboard');
            const [activeAdminSubMenu, setActiveAdminSubMenu] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            
            const [examForm, setExamForm] = useState({ title: '', course: '', month: 'January', year: '2026', subject: '', duration: 30, passingPercentage: 40, status: 'Active', instructions: ''});
            const [questionsList, setQuestionsList] = useState([]);
            const [curQuestionText, setCurQuestionText] = useState('');
            const [curOptions, setCurOptions] = useState({ A: '', B: '', C: '', D: '' });
            const [curCorrect, setCurCorrect] = useState('');
            const [curImage, setCurImage] = useState('');
            const [editExamId, setEditExamId] = useState(null);
            
            const [filters, setFilters] = useState({ search: '', month: 'all', year: 'all', status: 'all', percentage: 'all', course: 'all', dateFrom: '', dateTo: '', sortBy: 'dateDesc' });
            const [studentSearch, setStudentSearch] = useState('');
            
            const [newCourse, setNewCourse] = useState({ name: '', code: '', requireCode: false, fee: '' });
            const [editingStudent, setEditingStudent] = useState(null); 
            
            // Fees & Discount State
            const [feeModal, setFeeModal] = useState(null);
            const [feeAmount, setFeeAmount] = useState('');
            const [feeMode, setFeeMode] = useState('Cash');
            const [editFeeModal, setEditFeeModal] = useState(null);

            // Library State
            const librarySeats = Array.from({length: 100}, (_, i) => 'A' + (i+1));
            const [adminSeatModal, setAdminSeatModal] = useState(null);

            // Messages & Templates
            const [msgTemplate, setMsgTemplate] = useState("Hello [Name],\nYour fee amount of Rs. [Due] is pending for the [Course] course. Please pay as soon as possible.\nRegards,\nExcel Computer Education");
            const [birthdayMsgTemplate, setBirthdayMsgTemplate] = useState("Happy Birthday [Name]! 🎉🎂\nWishing you a fantastic day and a successful year ahead!\nRegards,\nExcel Computer Education");

            // Profile Edit (Admin)
            const [adminProfileEdit, setAdminProfileEdit] = useState({ adminId: '', adminPass: '' });

            // ---- STUDENT STATES ----
            const [activeStudentTab, setActiveStudentTab] = useState('dashboard');
            const [activeExam, setActiveExam] = useState(null);
            const [examQs, setExamQs] = useState([]);
            const [curQIdx, setCurQIdx] = useState(0);
            const [selAns, setSelAns] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            const [warnings, setWarnings] = useState(0);
            const [lastAttemptId, setLastAttemptId] = useState(null);
            const timerRef = useRef(null);
            
            const [bookingSeat, setBookingSeat] = useState(null); 
            const [joiningDate, setJoiningDate] = useState('');

            // Helper Functions
            const handleImageError = (e) => { e.target.src = 'https://via.placeholder.com/150?text=Logo'; };
            const showToast = (msg, type = 'success') => {
                const id = Date.now(); setToasts(p => [...p, {id, msg, type}]);
                setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
            };
            const formatTime = (seconds) => {
                if(!seconds && seconds !== 0) return "N/A";
                const m = Math.floor(seconds / 60); const s = seconds % 60;
                return `${m}m ${s}s`;
            };

            // ---- INIT FETCH ----
            useEffect(() => {
                const init = async () => {
                    try {
                        const res = await fetch(`${FIREBASE_URL}/.json`);
                        const data = await res.json() || {};
                        
                        setUsers(data.users ? Object.values(data.users) : []); 
                        setExams(data.exams ? Object.values(data.exams) : []); 
                        setAttempts(data.attempts ? Object.values(data.attempts) : []);
                        setPayments(data.payments ? Object.values(data.payments) : []);
                        setLoginHistory(data.loginHistory ? Object.values(data.loginHistory) : []);
                        
                        const dbCourses = data.courses ? Object.values(data.courses) : [
                            {name: 'RS-CIT', code: '', requireCode: false, fee: 3500}, 
                            {name: 'Tally Prime & Advance', code: '', requireCode: false, fee: 4000},
                            {name: 'Library', code: '', requireCode: false, fee: 500}
                        ];
                        setCourses(dbCourses);

                        if(data.settings) {
                            const mergedSettings = {...appSettings, ...data.settings};
                            setAppSettings(mergedSettings);
                            setAdminProfileEdit({adminId: mergedSettings.adminId, adminPass: mergedSettings.adminPass});
                            if(data.settings.msgTemplate) setMsgTemplate(data.settings.msgTemplate);
                            if(data.settings.birthdayMsgTemplate) setBirthdayMsgTemplate(data.settings.birthdayMsgTemplate);
                        } else {
                            setAdminProfileEdit({adminId: appSettings.adminId, adminPass: appSettings.adminPass});
                        }
                        
                    } catch(e) { showToast("Could not connect to database.", "error"); }
                    
                    setIsLoadingData(false);
                    setCurrentPage('login');
                    if (localStorage.getItem('rscit_theme') === 'dark') { setIsDarkMode(true); document.documentElement.classList.add('dark'); }
                };
                init();
            }, []);

            const toggleTheme = () => {
                const newMode = !isDarkMode; setIsDarkMode(newMode);
                if(newMode){ document.documentElement.classList.add('dark'); localStorage.setItem('rscit_theme', 'dark'); }
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('rscit_theme', 'light'); }
            };

            // ---- REGISTRATION LOGIC ----
            const handlePhotoUpload = (e, targetSetter) => {
                const file = e.target.files[0];
                if(file) {
                    if(file.size > 500000) return showToast("Photo must be less than 500KB", "error");
                    const r = new FileReader(); r.onloadend = () => targetSetter(prev => ({...prev, photo: r.result})); r.readAsDataURL(file);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                if(regData.mobile.length !== 10) return showToast("10-Digit WhatsApp Mobile Required", "error");
                if(regData.password !== regData.cPassword) return showToast("Passwords do not match", "error");
                if(users.some(u => u.mobile === regData.mobile)) return showToast("Mobile Already Registered!", "error");
                if(!regData.course) return showToast("Please select a course", "error");

                const selCourseObj = courses.find(c => c.name === regData.course);
                if(selCourseObj && selCourseObj.requireCode && regData.courseCode !== selCourseObj.code) {
                    return showToast("Invalid Course Code! Please enter correct code.", "error");
                }

                try {
                    let lastCodeRes = await fetch(`${FIREBASE_URL}/metadata/lastStudentCode.json`);
                    let lastCode = await lastCodeRes.json();
                    if(!lastCode || lastCode < 2000) lastCode = 2000;
                    const newCode = lastCode + 1;

                    const newUser = { 
                        ...regData, 
                        studentCode: newCode, role: 'student', active: 1, 
                        baseFee: selCourseObj ? (selCourseObj.fee || 0) : 0, 
                        discount: 0,
                        totalFee: selCourseObj ? (selCourseObj.fee || 0) : 0, 
                        paidFee: 0,
                        createdAt: new Date().toISOString() 
                    };
                    delete newUser.cPassword;

                    await fetch(`${FIREBASE_URL}/users/${newUser.mobile}.json`, { method: 'PUT', body: JSON.stringify(newUser) });
                    await fetch(`${FIREBASE_URL}/metadata/lastStudentCode.json`, { method: 'PUT', body: JSON.stringify(newCode) });
                    
                    setUsers([...users, newUser]);
                    showToast(`Registration Complete! Your Student Code is ${newCode}`);
                    setCurrentPage('login'); setLoginMobile(regData.mobile); setRegData(initRegData);
                } catch (error) { showToast("Registration Error!", "error"); }
            };

            const recordLogin = async (user) => {
                const entry = { id: 'LOG_' + Date.now(), name: user.name, mobile: user.mobile, role: user.role, time: new Date().toLocaleString(), timestamp: Date.now() };
                await fetch(`${FIREBASE_URL}/loginHistory/${entry.id}.json`, { method: 'PUT', body: JSON.stringify(entry) });
                setLoginHistory([...loginHistory, entry]);
            };

            // ---- LOGIN LOGIC ----
            const handleLogin = (e) => {
                e.preventDefault();
                if (loginRole === 'admin') {
                    if (loginMobile === appSettings.adminId && loginPass === appSettings.adminPass) {
                        setCurrentUser({ name: "Admin Office", role: "admin", mobile: "admin" }); 
                        setCurrentPage('admin-dashboard'); setActiveAdminMenu('dashboard'); setActiveAdminSubMenu('');
                        recordLogin({name: 'Admin', mobile: 'admin', role: 'admin'});
                        showToast("Welcome to Admin Dashboard!");
                    } else showToast("Invalid Admin ID or Password", "error");
                } else {
                    const u = users.find(x => x.mobile === loginMobile && x.password === loginPass);
                    if (u) {
                        if(u.active == 0 || u.active === false) return showToast("Account Deactivated by Admin", "error");
                        setCurrentUser(u); setCurrentPage('student-dashboard'); setActiveStudentTab('dashboard');
                        recordLogin(u);
                        showToast(`Welcome back, ${u.name}!`);
                    } else showToast("Invalid Mobile or Password", "error");
                }
            };
            const handleLogout = () => { setCurrentUser(null); setCurrentPage('login'); setLoginMobile(''); setLoginPass(''); showToast("Logged out successfully"); };

            // ---- ADMIN SETTINGS & FUNCTIONS ----
            const saveAppSettings = async () => {
                const newSettings = {...appSettings, msgTemplate, birthdayMsgTemplate};
                await fetch(`${FIREBASE_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(newSettings) });
                showToast("Website Settings Saved!");
            };

            const handleSiteLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const newSettings = {...appSettings, logo: reader.result};
                        setAppSettings(newSettings);
                        await fetch(`${FIREBASE_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(newSettings) });
                        showToast("Logo updated!");
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAddCourse = async () => {
                if(!newCourse.name.trim()) return;
                const updated = [...courses.filter(c=>c.name !== newCourse.name), {...newCourse, fee: Number(newCourse.fee)||0}];
                setCourses(updated); setNewCourse({name:'', code:'', requireCode:false, fee:''});
                await fetch(`${FIREBASE_URL}/courses.json`, { method: 'PUT', body: JSON.stringify(updated) });
                showToast("Course Saved successfully!");
            };
            const editCourseForm = (c) => {
                setNewCourse({name: c.name, code: c.code||'', requireCode: c.requireCode||false, fee: c.fee||0});
            };

            const handleDeleteCourse = async (cName) => {
                if(!confirm(`Delete "${cName}"?`)) return;
                const updated = courses.filter(c => c.name !== cName); setCourses(updated);
                await fetch(`${FIREBASE_URL}/courses.json`, { method: 'PUT', body: JSON.stringify(updated) });
                showToast("Course removed.");
            };

            const saveAdminProfile = async () => {
                if(!adminProfileEdit.adminId || !adminProfileEdit.adminPass) return showToast("Fields cannot be empty", "error");
                const newSettings = {...appSettings, adminId: adminProfileEdit.adminId, adminPass: adminProfileEdit.adminPass};
                setAppSettings(newSettings);
                await fetch(`${FIREBASE_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(newSettings) });
                showToast("Admin Credentials Updated!");
            };

            const handleSaveStudentEdit = async () => {
                if(!editingStudent) return;
                if(editingStudent.password.length < 4) return showToast("Password too short", "error");
                
                // Recalculate fee if course changed
                const selCourseObj = courses.find(c => c.name === editingStudent.course);
                const base = selCourseObj ? (selCourseObj.fee || 0) : 0;
                const disc = Number(editingStudent.discount) || 0;
                editingStudent.baseFee = base;
                editingStudent.totalFee = base - disc;

                try {
                    await fetch(`${FIREBASE_URL}/users/${editingStudent.mobile}.json`, { method: 'PUT', body: JSON.stringify(editingStudent) });
                    setUsers(users.map(u => u.mobile === editingStudent.mobile ? editingStudent : u));
                    showToast("Student Profile Updated!"); setEditingStudent(null);
                } catch(e) { showToast("Failed to update student", "error"); }
            };

            const handleCollectFee = async (e) => {
                e.preventDefault();
                const amt = Number(feeAmount);
                if(amt <= 0) return showToast("Enter valid amount", "error");
                const targetUser = users.find(u => u.mobile === feeModal.mobile);
                const updatedPaid = (targetUser.paidFee || 0) + amt;
                const updatedUser = { ...targetUser, paidFee: updatedPaid };
                const receipt = { id: 'REC_' + Date.now(), studentMobile: targetUser.mobile, studentName: targetUser.name, course: targetUser.course, amount: amt, mode: feeMode, date: new Date().toLocaleString() };

                try {
                    await fetch(`${FIREBASE_URL}/users/${targetUser.mobile}.json`, { method: 'PUT', body: JSON.stringify(updatedUser) });
                    await fetch(`${FIREBASE_URL}/payments/${receipt.id}.json`, { method: 'PUT', body: JSON.stringify(receipt) });
                    setUsers(users.map(u => u.mobile === targetUser.mobile ? updatedUser : u));
                    setPayments([...payments, receipt]);
                    setFeeModal(null); setFeeAmount(''); showToast("Fee Collected!");
                } catch(e) { showToast("Payment Error", "error"); }
            };

            const handleSaveEditFee = async (e) => {
                e.preventDefault();
                try {
                    const disc = Number(editFeeModal.discount) || 0;
                    const finalTotal = (editFeeModal.baseFee || editFeeModal.totalFee || 0) - disc;
                    const finalObj = {...editFeeModal, totalFee: finalTotal, discount: disc};
                    
                    await fetch(`${FIREBASE_URL}/users/${finalObj.mobile}.json`, { method: 'PUT', body: JSON.stringify(finalObj) });
                    setUsers(users.map(u => u.mobile === finalObj.mobile ? finalObj : u));
                    setEditFeeModal(null); showToast("Fee Details Updated with Discount!");
                } catch(e) { showToast("Failed to update fees", "error"); }
            };

            // ---- ADMIN EXAMS ----
            const handleAddQuestionManual = () => {
                if (!curQuestionText || !curOptions.A || !curOptions.B || !curOptions.C || !curOptions.D || !curCorrect) return showToast("Enter question, all options & correct option!", "error");
                setQuestionsList([...questionsList, { question: curQuestionText, options: [curOptions.A, curOptions.B, curOptions.C, curOptions.D], correct: curCorrect }]);
                setCurQuestionText(''); setCurOptions({A:'', B:'', C:'', D:''}); setCurCorrect(''); showToast("Question added!");
            };
            
            const handleSaveExam = async () => {
                if (!examForm.title.trim() || !examForm.course) return showToast("Enter Exam Name & Select Course!", "error");
                const newExam = { id: editExamId || 'exam_' + Date.now(), ...examForm, questions: questionsList, createdAt: Date.now() };
                try {
                    await fetch(`${FIREBASE_URL}/exams/${newExam.id}.json`, { method: 'PUT', body: JSON.stringify(newExam) });
                    let updatedExams = editExamId ? exams.map(e => e.id === editExamId ? newExam : e) : [...exams, newExam];
                    setExams(updatedExams); resetExamForm(); setActiveAdminMenu('exams'); setActiveAdminSubMenu('exams-list'); showToast("Exam Saved!");
                } catch(e) { showToast("Failed to save", "error"); }
            };
            const resetExamForm = () => { setEditExamId(null); setExamForm({ title: '', course: '', month: 'January', year: '2026', subject: '', duration: 30, passingPercentage: 40, status: 'Active', instructions: ''}); setQuestionsList([]); };
            const handleEditExam = (exam) => { setEditExamId(exam.id); setExamForm({...exam}); setQuestionsList(exam.questions||[]); setActiveAdminMenu('exams'); setActiveAdminSubMenu('exams-create'); };
            const handleDeleteExam = async (id) => { if(confirm("Delete this exam?")) { await fetch(`${FIREBASE_URL}/exams/${id}.json`, { method: 'DELETE' }); setExams(exams.filter(e => e.id !== id)); showToast("Deleted"); } };

            // ---- ADMIN LIBRARY ----
            const adminAssignSeat = async (e) => {
                e.preventDefault(); let userToUpdate;
                if (adminSeatModal.isManual) {
                    // Update existing manual guest if editing
                    if (adminSeatModal.occupier && adminSeatModal.occupier.mobile.startsWith('GUEST_')) {
                        userToUpdate = { ...adminSeatModal.occupier, name: adminSeatModal.manualName, joiningDate: adminSeatModal.joiningDate };
                    } else {
                        const tempMobile = "GUEST_" + Date.now();
                        userToUpdate = { name: adminSeatModal.manualName, mobile: tempMobile, course: 'Library', role: 'student', active: 1, seatNumber: adminSeatModal.seatNumber, joiningDate: adminSeatModal.joiningDate, totalFee: 0, paidFee: 0 };
                    }
                } else {
                    userToUpdate = users.find(u => u.mobile === adminSeatModal.selectedMobile);
                    if(!userToUpdate) return;
                    userToUpdate = {...userToUpdate, seatNumber: adminSeatModal.seatNumber, joiningDate: adminSeatModal.joiningDate};
                }
                
                await fetch(`${FIREBASE_URL}/users/${userToUpdate.mobile}.json`, { method: 'PUT', body: JSON.stringify(userToUpdate) });
                
                if (adminSeatModal.isManual && !adminSeatModal.occupier) {
                    setUsers([...users, userToUpdate]);
                } else {
                    setUsers(users.map(u => u.mobile === userToUpdate.mobile ? userToUpdate : u));
                }
                setAdminSeatModal(null); showToast("Seat Assigned/Updated!");
            };
            
            const adminFreeSeat = async (mobile) => {
                const userToUpdate = users.find(u => u.mobile === mobile);
                if(!userToUpdate) return;
                
                if(mobile.startsWith('GUEST_')){
                    await fetch(`${FIREBASE_URL}/users/${mobile}.json`, { method: 'DELETE' });
                    setUsers(users.filter(u => u.mobile !== mobile));
                } else {
                    const updated = {...userToUpdate, seatNumber: null, joiningDate: null};
                    await fetch(`${FIREBASE_URL}/users/${mobile}.json`, { method: 'PUT', body: JSON.stringify(updated) });
                    setUsers(users.map(u => u.mobile === mobile ? updated : u)); 
                }
                setAdminSeatModal(null); showToast("Seat Freed!");
            };

            // ---- BIRTHDAY & WHATSAPP LOGIC ----
            const getUpcomingBirthdays = () => {
                const today = new Date();
                today.setHours(0,0,0,0);
                return users.filter(u => u.role === 'student' && u.dob).map(u => {
                    const dobParts = u.dob.split('-');
                    if(dobParts.length !== 3) return null;
                    const bMonth = parseInt(dobParts[1]) - 1;
                    const bDate = parseInt(dobParts[2]);
                    
                    let bThisYear = new Date(today.getFullYear(), bMonth, bDate);
                    if (bThisYear < today) bThisYear.setFullYear(today.getFullYear() + 1);
                    
                    const diffTime = bThisYear - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                                                            <div><label class="block text-xs font-bold text-gray-500 mb-1">Passing %</label><input type="number" value={examForm.passingPercentage} onChange={e=>setExamForm({...examForm, passingPercentage: Number(e.target.value)})} class="w-full p-2 border rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600"/></div>

                                                    renderReportTable()

                                                    <textarea rows="5" value={msgTemplate} onChange={e=>setMsgTemplate(e.target.value)} class="w-full p-3 border rounded text-xs dark:bg-gray-700 dark:border-gray-600 mb-2"></textarea>

                                                            </div>
                                                        ))}
                                                        {getDueStudents().length===0 && <p class="text-sm text-gray-500 text-center py-4">No pending dues.</p>}
                                                    </div>
                                                </div>
                                                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border dark:border-gray-700 shadow-sm">

                                            </div>

                                        {/* SETTINGS */}
                                        {activeAdminMenu === 'settings' && (
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                                    <div><label class="block text-xs font-bold text-gray-500 mb-1">Physical Address</label><input type="text" value={appSettings.address} onChange={e=>setAppSettings({...appSettings, address:e.target.value})} class="w-full p-2 border rounded text-sm dark:bg-gray-700"/></div>
                                                    <div><label class="block text-xs font-bold text-gray-500 mb-1">Contact Numbers</label><input type="text" value={appSettings.phone} onChange={e=>setAppSettings({...appSettings, phone:e.target.value})} class="w-full p-2 border rounded text-sm dark:bg-gray-700"/></div>
                                                    <div><label class="block text-xs font-bold text-gray-500 mb-1">Highlight Marquee (Top Bar)</label><input type="text" value={appSettings.marquee} onChange={e=>setAppSettings({...appSettings, marquee:e.target.value})} class="w-full p-2 border rounded text-sm dark:bg-gray-700"/></div>

                                                        <div class="grid grid-cols-2 gap-2 mb-4">
                                                            <input type="text" value={newCourse.name} onChange={e=>setNewCourse({...newCourse, name:e.target.value})} placeholder="Course Name" class="p-2 border rounded-lg text-xs dark:bg-gray-700"/>
                                                            <input type="number" value={newCourse.fee} onChange={e=>setNewCourse({...newCourse, fee:e.target.value})} placeholder="Total Fee (₹)" class="p-2 border rounded-lg text-xs dark:bg-gray-700"/>
                                                            <input type="text" value={newCourse.code} onChange={e=>setNewCourse({...newCourse, code:e.target.value})} placeholder="Validation Code" class="p-2 border rounded-lg text-xs dark:bg-gray-700"/>
                                                            <div class="flex items-center gap-1 text-xs font-bold text-gray-600 dark:text-gray-300"><input type="checkbox" checked={newCourse.requireCode} onChange={e=>setNewCourse({...newCourse, requireCode:e.target.checked})}/> Code Required to Register</div>

                                            </div>

                                                        <i class="fa-solid fa-users text-4xl text-indigo-500 mb-3 group-hover:scale-110 transition-transform"></i><p class="font-bold text-gray-700 dark:text-gray-200">Export All Students</p>
                                                    </button>
                                                    <button onClick={()=>{downloadGenericReport(attempts, "All_Exam_Records");}} class="p-8 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl hover:bg-gray-50 dark:hover:bg-gray-700 transition group">
                                                        <i class="fa-solid fa-file-contract text-4xl text-emerald-500 mb-3 group-hover:scale-110 transition-transform"></i><p class="font-bold text-gray-700 dark:text-gray-200">Export Exam Results</p>
                                                    </button>
                                                    <button onClick={()=>{downloadGenericReport(payments, "All_Payments_Log");}} class="p-8 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl hover:bg-gray-50 dark:hover:bg-gray-700 transition group">
                                                        <i class="fa-solid fa-indian-rupee-sign text-4xl text-amber-500 mb-3 group-hover:scale-110 transition-transform"></i><p class="font-bold text-gray-700 dark:text-gray-200">Export Fee Database</p>
                                                    </button>
                                                </div>
                                                <p class="text-xs text-gray-500 mt-10">Data will be exported directly as .xlsx files compatible with MS Excel.</p>
                                            </div>
                                        )}

                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    {currentPage !== 'admin-dashboard' && (
                        <footer class="bg-gray-900 text-gray-400 text-center py-6 mt-auto">
                            <div class="container mx-auto px-4 text-xs space-y-2"><p class="font-bold text-gray-300">© 2026 {appSettings.title}</p><p>Website Developer: Virendra Singh Sisodiya | Mobile: 8949538179</p></div>
                        </footer>
                    )}
                    
                    {/* ---- ABSOLUTE ROOT LEVEL MODALS ---- */}
                    
                    {editingStudent && (
                        <div class="fixed inset-0 z-[100] flex items-center justify-center modal-overlay p-4">
                            <div class="bg-white dark:bg-gray-800 w-full max-w-2xl rounded-2xl shadow-2xl p-6 overflow-y-auto max-h-[90vh]">
                                <div class="flex justify-between items-center border-b pb-3 mb-4"><h3 class="text-xl font-bold">Edit Student</h3><button onClick={()=>setEditingStudent(null)} class="text-gray-500 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button></div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-xs font-bold text-gray-500">Name</label><input type="text" value={editingStudent.name} onChange={e=>setEditingStudent({...editingStudent, name:e.target.value})} class="w-full p-2 border rounded text-sm dark:bg-gray-700"/></div>
                                    <div><label class="text-xs font-bold text-gray-500">Father Name</label><input type="text" value={editingStudent.fatherName} onChange={e=>setEditingStudent({...editingStudent, fatherName:e.target.value})} class="w-full p-2 border rounded text-sm dark:bg-gray-700"/></div>
                                    <div><label class="text-xs font-bold text-gray-500">WhatsApp (ID)</label><input type="text" value={editingStudent.mobile} disabled class="w-full p-2 border rounded text-sm bg-gray-100 dark:bg-gray-600 text-gray-400 cursor-not-allowed"/></div>
                                    <div><label class="text-xs font-bold text-gray-500">Password</label><input type="text" value={editingStudent.password} onChange={e=>setEditingStudent({...editingStudent, password:e.target.value})} class="w-full p-2 border rounded text-sm dark:bg-gray-700"/></div>
                                    <div><label class="text-xs font-bold text-gray-500">Course</label><select value={editingStudent.course} onChange={e=>setEditingStudent({...editingStudent, course:e.target.value})} class="w-full p-2 border rounded text-sm dark:bg-gray-700">{courses.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}</select></div>
                                    <div><label class="text-xs font-bold text-gray-500">Account Status</label><select value={editingStudent.active} onChange={e=>setEditingStudent({...editingStudent, active:Number(e.target.value)})} class="w-full p-2 border rounded text-sm dark:bg-gray-700"><option value="1">Active</option><option value="0">Inactive</option></select></div>
                                    <div><label class="text-xs font-bold text-gray-500 text-brand-500">Special Discount (₹)</label><input type="number" value={editingStudent.discount || 0} onChange={e=>setEditingStudent({...editingStudent, discount: Number(e.target.value)})} class="w-full p-2 border-2 border-brand-300 rounded text-sm dark:bg-gray-700"/></div>
                                    <div></div>
                                </div>
                                <div class="mt-6 flex justify-end gap-3"><button onClick={()=>setEditingStudent(null)} class="px-4 py-2 bg-gray-200 text-gray-800 rounded font-bold">Cancel</button><button onClick={handleSaveStudentEdit} class="px-6 py-2 bg-brand-600 text-white rounded font-bold">Save Changes</button></div>
                            </div>
                        </div>
                    )}

                    {feeModal && (
                        <div class="fixed inset-0 z-[100] flex items-center justify-center modal-overlay p-4">
                            <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl shadow-2xl p-6 border dark:border-gray-700">
                                <h3 class="text-lg font-bold border-b pb-2 mb-4">Collect Fee: {feeModal.name}</h3>
                                <div class="flex justify-between text-sm mb-4"><span>Final Fee: ₹{feeModal.totalFee||0}</span><span class="text-rose-500 font-bold">Due: ₹{(feeModal.totalFee||0)-(feeModal.paidFee||0)}</span></div>
                                <form onSubmit={handleCollectFee} class="space-y-4">
                                    <input type="number" required placeholder="Amount Receiving" value={feeAmount} onChange={e=>setFeeAmount(e.target.value)} class="w-full p-3 border-2 border-emerald-200 rounded-xl text-lg font-bold dark:bg-gray-700"/>
                                    <select value={feeMode} onChange={e=>setFeeMode(e.target.value)} class="w-full p-3 border rounded-xl text-sm dark:bg-gray-700"><option>Cash</option><option>UPI/Online</option><option>Bank Transfer</option></select>
                                    <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md">Confirm Payment</button>
                                </form>
                                <button onClick={()=>setFeeModal(null)} class="w-full mt-3 bg-gray-200 text-gray-800 font-bold py-3 rounded-xl">Cancel</button>
                            </div>
                        </div>
                    )}

                    {editFeeModal && (
                        <div class="fixed inset-0 z-[100] flex items-center justify-center modal-overlay p-4">
                            <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl shadow-2xl p-6 border dark:border-gray-700">
                                <h3 class="text-lg font-bold border-b pb-2 mb-4">Edit Fee Structure: {editFeeModal.name}</h3>
                                <form onSubmit={handleSaveEditFee} class="space-y-4">
                                    <div><label class="text-xs font-bold text-gray-500">Base Course Fee (₹)</label><input type="number" required value={editFeeModal.baseFee || editFeeModal.totalFee} onChange={e=>setEditFeeModal({...editFeeModal, baseFee: Number(e.target.value)})} class="w-full p-3 border rounded-xl text-sm dark:bg-gray-700" disabled/></div>
                                    <div><label class="text-xs font-bold text-brand-500">Discount Amount (₹)</label><input type="number" required value={editFeeModal.discount || 0} onChange={e=>setEditFeeModal({...editFeeModal, discount: Number(e.target.value)})} class="w-full p-3 border-2 border-brand-300 rounded-xl text-sm font-bold dark:bg-gray-700"/></div>
                                    <div><label class="text-xs font-bold text-gray-500">Already Paid Amount (₹)</label><input type="number" required value={editFeeModal.paidFee} onChange={e=>setEditFeeModal({...editFeeModal, paidFee: Number(e.target.value)})} class="w-full p-3 border rounded-xl text-sm font-bold dark:bg-gray-700 text-emerald-600"/></div>
                                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl">Force Update Fee</button>
                                </form>
                                <button onClick={()=>setEditFeeModal(null)} class="w-full mt-3 bg-gray-200 text-gray-800 font-bold py-3 rounded-xl">Cancel</button>
                            </div>
                        </div>
                    )}

                    {adminSeatModal && (
                        <div class="fixed inset-0 z-[100] flex items-center justify-center modal-overlay p-4">
                            <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl shadow-2xl p-6 border dark:border-gray-700">
                                <h3 class="text-lg font-bold border-b pb-2 mb-4">Manage Seat: <span class="text-brand-600">{adminSeatModal.seatNumber}</span></h3>
                                <form onSubmit={adminAssignSeat} class="space-y-3">
                                    <div class="flex justify-center gap-4 text-sm font-bold border-b pb-3 mb-2">
                                        <label class="cursor-pointer"><input type="radio" name="stype" checked={!adminSeatModal.isManual} onChange={()=>setAdminSeatModal({...adminSeatModal, isManual:false, manualName: ''})} class="mr-1"/> Student</label>
                                        <label class="cursor-pointer"><input type="radio" name="stype" checked={adminSeatModal.isManual} onChange={()=>setAdminSeatModal({...adminSeatModal, isManual:true, manualName: adminSeatModal.occupier?.name || ''})} class="mr-1"/> Custom Name</label>
                                    </div>
                                    {!adminSeatModal.isManual ? (
                                        <select required onChange={e=>setAdminSeatModal({...adminSeatModal, selectedMobile: e.target.value})} class="w-full p-2.5 border rounded-lg text-sm dark:bg-gray-700">
                                            <option value="">Select Student...</option>
                                            {users.filter(u=>u.role==='student' && (!u.seatNumber || u.seatNumber === adminSeatModal.seatNumber)).map(u=><option key={u.mobile} value={u.mobile}>{u.name} ({u.course})</option>)}
                                        </select>
                                    ) : (
                                        <input type="text" required value={adminSeatModal.manualName || ''} placeholder="Enter Name Manually" onChange={e=>setAdminSeatModal({...adminSeatModal, manualName: e.target.value})} class="w-full p-2.5 border rounded-lg text-sm dark:bg-gray-700"/>
                                    )}
                                    <input type="date" required value={adminSeatModal.joiningDate || ''} onChange={e=>setAdminSeatModal({...adminSeatModal, joiningDate: e.target.value})} class="w-full p-2.5 border rounded-lg text-sm dark:bg-gray-700"/>
                                    <div class="flex gap-2 mt-4">
                                        <button type="submit" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md">Save Seat</button>
                                        {adminSeatModal.occupier && <button type="button" onClick={(e)=>{e.preventDefault(); adminFreeSeat(adminSeatModal.occupier.mobile);}} class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl shadow-md">Free Up</button>}
                                    </div>
                                </form>
                                <button onClick={()=>setAdminSeatModal(null)} class="w-full mt-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 rounded-xl">Cancel</button>
                            </div>
                        </div>
                    )}

                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
